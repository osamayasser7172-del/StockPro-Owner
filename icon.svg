<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Box body -->
  <rect x="136" y="200" width="240" height="180" rx="16" fill="url(#box)" opacity="0.9"/>
  <!-- Box flap left -->
  <polygon points="136,200 176,140 256,160 256,200" fill="#e0e7ff" opacity="0.85"/>
  <!-- Box flap right -->
  <polygon points="376,200 336,140 256,160 256,200" fill="#ffffff" opacity="0.9"/>
  <!-- Arrow up -->
  <polygon points="256,110 220,160 248,160 248,260 264,260 264,160 292,160" fill="#22d3ee" opacity="0.9"/>
  <!-- Chart bars -->
  <rect x="180" y="310" width="28" height="50" rx="4" fill="#4f46e5" opacity="0.5"/>
  <rect x="220" y="290" width="28" height="70" rx="4" fill="#4f46e5" opacity="0.65"/>
  <rect x="260" y="270" width="28" height="90" rx="4" fill="#4f46e5" opacity="0.8"/>
  <rect x="300" y="250" width="28" height="110" rx="4" fill="#4f46e5" opacity="0.95"/>
</svg>
